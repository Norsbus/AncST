# AncST Core Pipeline Environment
# Complete and tested configuration
# Last updated: January 16, 2026
#
# CRITICAL: This file follows the conda-first, pip-last pattern
# 1. ALL conda packages are installed first
# 2. pip packages ONLY for things not available in conda
# 3. Source compilations (macle, clasp) link against conda libraries
#
# To create environment:
#   conda env create -f environment.yml
#
# To update existing environment:
#   conda env update -f environment.yml --prune
#
# For best performance, enable strict channel priority (after creating env):
#   conda config --env --set channel_priority strict

name: AncST
channels:
  - conda-forge  # Highest priority - newest versions, build tools
  - bioconda     # Bioinformatics packages
  - defaults     # Fallback only

dependencies:
  # PYTHON VERSION
  - python=3.11  # LTS support until Oct 2026

  # EVERYTHING FROM CONDA (verified to exist!)

  # Core Scientific Stack (all from conda-forge)
  - numpy>=2.0          # Latest NumPy 2.x
  - scipy>=1.13         # Latest SciPy
  - pandas>=2.2         # Latest pandas
  - matplotlib>=3.8     # For any plotting needs

  # Bioinformatics (explicit bioconda for maintained versions)
  - conda-forge::biopython>=1.83     # Latest from conda-forge
  - bioconda::blast>=2.14            # NCBI BLAST+ suite
  - bioconda::genmap>=1.3            # K-mer mappability
  - bioconda::fasta-splitter>=0.2.6  # FASTA file splitting tool
  - conda-forge::ncbi-datasets-cli   # NCBI genome downloads (conda-forge only)

  # Snakemake (from bioconda - latest 9.x available!)
  # Pinned to >=9.22.0: cluster previously used 9.14.6 (which is fine for
  # update()-backup feature added in 9.13.7 and fixes in 9.14.2/9.14.3),
  # but 9.21.1 brings 54 bug fixes including "do not rerun when checkpoint
  # job missing but downstream file exists" (relevant to update_compared),
  # "fix checkpoint handling corner cases", "standardize handling of
  # resources" and "CLI/profile runtime override interpreted as minutes not
  # seconds". 9.22.0 adds Python 3.15 compat + a symlink-mtime fix +
  # storage --touch behavior fix. Run_pipeline.sh --continue-run flow
  # was designed and verified against 9.22.0 persistence.py source.
  # See CHANGELOG between 9.14.6 and 9.22.0.
  - bioconda::snakemake>=9.22.0   # Full snakemake, not minimal

  # Core dependencies available in conda
  - pyyaml>=6.0         # YAML parsing
  - jinja2>=3.1         # Template engine
  - docutils>=0.19      # Documentation
  - gitpython>=3.1      # Git integration
  - psutil>=5.9         # System monitoring
  - configargparse>=1.5 # Config parsing
  - appdirs>=1.4        # Platform dirs
  - humanfriendly>=10.0 # User output
  - tabulate>=0.9       # Tables
  - tqdm>=4.65          # Progress bars
  - packaging>=23.0     # Version handling
  - requests>=2.31      # HTTP
  - jsonschema>=4.17    # JSON validation
  - pulp>=2.7           # Linear programming (conda-forge)
  - smart_open>=6.0     # File opening (conda-forge, note underscore!)
  - wrapt>=1.14         # Function wrapping
  - immutables>=0.19    # Immutable structures
  - toposort>=1.10      # Topological sorting (conda-forge)
  - nbformat>=5.9       # Jupyter support

  # Build Tools (for compiling macle/clasp against conda libs)
  # CRITICAL: On macOS, use SYSTEM compilers (Xcode/CommandLineTools), not conda compilers
  #   Why: Conda compilers may be x86_64 on ARM64 Mac (Rosetta), causing conflicts
  #   System compilers are always native and properly configured
  # On Linux, conda compilers work fine (install via install.sh if needed)
  - conda-forge::cmake>=3.5,<4.0   # Compatible with libdivsufsort, blocks CMake 4.x
  - conda-forge::make>=4.3         # Build tool
  - conda-forge::git>=2.30         # Version control
  - conda-forge::curl              # For downloads
  - conda-forge::openssl>=3.0      # For clasp SSL support

  # PIP PACKAGES - ONLY for what's NOT in conda!
  - pip>=23.0           # Latest pip for better resolver
  - pip:
      # Snakemake plugin interfaces (PyPI only)
      - snakemake-interface-common>=1.17
      - snakemake-interface-executor-plugins>=9.0
      - snakemake-interface-storage-plugins>=3.2
      - snakemake-interface-report-plugins>=1.0
      - snakemake-interface-logger-plugins>=1.0

      # These are ONLY on PyPI, not conda
      - connection-pool>=0.0.3
      - throttler>=1.2.2
      - reretry>=0.11.8
      - conda-inject>=1.3.2
      - dpath>=2.1          # Dict paths (PyPI only)
      - yte>=1.5            # YAML templates (PyPI only)
      - plac>=1.4           # CLI parsing (PyPI only)

# IMPORTANT NOTES
#
# 1. Channel Strategy:
#    - Explicit channels (conda-forge::, bioconda::) for critical packages
#    - Prevents conflicts between conda-forge and defaults (incompatible since 2021)
#    - Ensures bioinformatics tools come from bioconda (maintained versions)
#    - Ensures build tools come from conda-forge (designed to work together)
#
# 2. Package name corrections:
#    - Use 'smart_open' not 'smart-open' in conda
#    - Use 'snakemake' not 'snakemake-minimal' for latest versions
#    - fastjsonschema is handled by snakemake dependencies
#
# 3. Version strategy:
#    - Using >= to get latest stable versions
#    - Build tools use ranges (e.g., cmake>=3.5,<4.0) for backward compatibility
#    - Conda solver will handle compatibility
#
# 4. Source compilations (macle, clasp):
#    - Must be compiled AFTER environment creation
#    - The install.sh script handles this
#    - They link against conda's libraries (especially OpenSSL for clasp)
#
# 5. To verify installation:
#    conda activate AncST
#    python -c "import snakemake, numpy, Bio; print('Core packages OK')"
#    snakemake --version  # Should show 9.14.x or higher
#    cmake --version      # Should show 3.x (not 4.x)